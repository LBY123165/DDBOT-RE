# DDBOT-WSa 配置文件示例
# 复制到项目根目录并重命名为 application.yaml

# ─── OneBot v11 连接配置 ───────────────────────────────────────────────────────
# 支持两种模式（二选一）：
#
# 【推荐】反向 WS 模式：Bot 启动后监听，等待 NapCat/LLOneBot 主动连入
#   在 NapCat/LLOneBot 中配置"反向 WebSocket"，地址填 ws://<本机IP>:8080
#
# 【备用】正向 WS 模式：Bot 主动连接 OneBot 的 ws-server
#   在 NapCat/LLOneBot 中开启"正向 WebSocket"，地址默认 127.0.0.1:3001
onebot:
  # 反向 WS 监听地址（推荐，填此项则忽略 ws_url）
  ws_listen: "0.0.0.0:8080"
  # 正向 WS 地址（ws_listen 留空时生效）
  # ws_url: "ws://127.0.0.1:3001"
  # 鉴权 Token，与 OneBot 实现的 access_token 保持一致；留空则不鉴权
  access_token: ""


# ─── B 站配置 ─────────────────────────────────────────────────────────────────
bilibili:
  # B 站账号 Cookie（可选，配置后可关注更多 UP 主）
  # 登录 bilibili.com 后从浏览器 Cookie 中获取
  SESSDATA: ""
  bili_jct: ""
  # 直播轮询间隔（不建议低于 20s，避免被风控）
  live_interval: "30s"
  # 动态轮询间隔
  news_interval: "90s"

# ─── 斗鱼配置 ─────────────────────────────────────────────────────────────────
douyu:
  interval: "60s"

# ─── 虎牙配置 ─────────────────────────────────────────────────────────────────
huya:
  interval: "60s"

# ─── AcFun 配置 ───────────────────────────────────────────────────────────────
acfun:
  interval: "60s"

# ─── YouTube 配置 ─────────────────────────────────────────────────────────────
youtube:
  # YouTube RSS 轮询间隔
  interval: "120s"

# ─── 微博配置 ─────────────────────────────────────────────────────────────────
weibo:
  interval: "120s"

# ─── WebUI 配置 ───────────────────────────────────────────────────────────────
webui:
  # 监听地址和端口（默认 3000）
  addr: "0.0.0.0:3000"

# ─── 日志配置 ─────────────────────────────────────────────────────────────────
# 日志级别: debug / info / warn / error
log_level: "info"

# ─── 管理员配置 ───────────────────────────────────────────────────────────────
# 首次启动时会自动在数据库 admins 表中初始化，也可直接通过 WebUI 管理
# admin_qq: []
